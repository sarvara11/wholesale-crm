name: CI / CD — Build → ECR → ECS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION:   eu-west-1
  ECR_REPO:     wholesale-crm
  ECS_CLUSTER:  wholesale-crm
  ECS_SERVICE:  wholesale-crm
  IMAGE_TAG:    ${{ github.sha }}

jobs:
  # ── Job 1: Lint & Test ──────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: npm }
      - run: npm ci
      - run: npm run lint
      - run: npm test

  # ── Job 2: Build → Push to ECR ─────────────────────────────────────────────
  build:
    name: Build & Push to ECR
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      image: ${{ steps.build.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          IMAGE_URI="$REGISTRY/$ECR_REPO:$IMAGE_TAG"
          docker build -t "$IMAGE_URI" .
          docker push  "$IMAGE_URI"
          # Also tag as latest
          docker tag  "$IMAGE_URI" "$REGISTRY/$ECR_REPO:latest"
          docker push "$REGISTRY/$ECR_REPO:latest"
          echo "image=$IMAGE_URI" >> "$GITHUB_OUTPUT"

  # ── Job 3: Deploy to ECS ───────────────────────────────────────────────────
  deploy:
    name: Deploy to ECS Fargate
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition $ECS_SERVICE \
            --query taskDefinition \
            --output json > task-def.json

      - name: Update image in task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def.json
          container-name:  ${{ env.ECS_SERVICE }}
          image:           ${{ needs.build.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service:         ${{ env.ECS_SERVICE }}
          cluster:         ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Smoke test /health
        run: |
          ALB=$(aws elbv2 describe-load-balancers \
            --names wholesale-crm-alb \
            --query 'LoadBalancers[0].DNSName' \
            --output text)
          echo "ALB: http://$ALB"
          curl -f "http://$ALB/health" || exit 1
