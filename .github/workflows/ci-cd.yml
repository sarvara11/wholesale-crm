name: CI / CD — Build → ECR → ECS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION:   eu-west-1
  ECR_REPO:     wholesale-crm
  ECS_CLUSTER:  wholesale-crm
  ECS_SERVICE:  wholesale-crm
  IMAGE_TAG:    ${{ github.sha }}

jobs:
  # ── Job 1: Lint & Test ──────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: npm }
      - run: npm ci
      - run: npm run lint
      - run: npm test

  # ── Job 2: Build → Push to ECR ─────────────────────────────────────────────
  build:
    name: Build & Push to ECR
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      image: ${{ steps.build.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          IMAGE_URI="$REGISTRY/$ECR_REPO:$IMAGE_TAG"
          docker build -t "$IMAGE_URI" .
          docker push  "$IMAGE_URI"
          docker tag   "$IMAGE_URI" "$REGISTRY/$ECR_REPO:latest"
          docker push  "$REGISTRY/$ECR_REPO:latest"
          echo "image=$IMAGE_URI" >> "$GITHUB_OUTPUT"

  # ── Job 3: Deploy to ECS ───────────────────────────────────────────────────
  deploy:
    name: Deploy to ECS Fargate
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Build new task definition with updated image
        id: task-def
        env:
          NEW_IMAGE: ${{ needs.build.outputs.image }}
        run: |
          # Download current task definition and swap in the new image.
          # Strip read-only fields that register-task-definition rejects.
          aws ecs describe-task-definition \
            --task-definition "$ECS_SERVICE" \
            --query taskDefinition \
            --output json \
          | jq --arg IMAGE "$NEW_IMAGE" '
              .containerDefinitions[0].image = $IMAGE
              | del(
                  .taskDefinitionArn,
                  .revision,
                  .status,
                  .requiresAttributes,
                  .compatibilities,
                  .registeredAt,
                  .registeredBy
                )
            ' > new-task-def.json

          echo "--- new task definition ---"
          jq '.containerDefinitions[0].image' new-task-def.json

      - name: Register new task definition
        id: register
        run: |
          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://new-task-def.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "arn=$NEW_ARN" >> "$GITHUB_OUTPUT"
          echo "Registered: $NEW_ARN"

      - name: Update ECS service to new task definition
        run: |
          aws ecs update-service \
            --cluster        "$ECS_CLUSTER" \
            --service        "$ECS_SERVICE" \
            --task-definition "${{ steps.register.outputs.arn }}" \
            --force-new-deployment \
            --output json > /dev/null
          echo "Service update triggered."

      - name: Wait for ECS service to stabilise
        # aws ecs wait services-stable hard-caps at 40 polls × 15 s = 10 min.
        # Rolling deployments with 2 tasks + health-check grace period routinely
        # exceed that. This loop polls for up to 20 minutes instead.
        run: |
          echo "Waiting for service stability (up to 20 min)…"
          TIMEOUT=1200
          ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            DEPLOYMENTS=$(aws ecs describe-services \
              --cluster  "$ECS_CLUSTER" \
              --services "$ECS_SERVICE" \
              --query    'services[0].deployments | length(@)' \
              --output   text)
            RUNNING=$(aws ecs describe-services \
              --cluster  "$ECS_CLUSTER" \
              --services "$ECS_SERVICE" \
              --query    'services[0].deployments[?status==`PRIMARY`].runningCount | [0]' \
              --output   text)
            DESIRED=$(aws ecs describe-services \
              --cluster  "$ECS_CLUSTER" \
              --services "$ECS_SERVICE" \
              --query    'services[0].desiredCount' \
              --output   text)
            echo "${ELAPSED}s — deployments active: ${DEPLOYMENTS}, running: ${RUNNING}/${DESIRED}"
            if [ "$DEPLOYMENTS" = "1" ] && [ "$RUNNING" = "$DESIRED" ]; then
              echo "Service is stable."
              break
            fi
            sleep 15
            ELAPSED=$((ELAPSED + 15))
          done
          if [ $ELAPSED -ge $TIMEOUT ]; then
            echo "::error::Service did not stabilise within ${TIMEOUT}s"
            exit 1
          fi

      - name: Verify new task definition is actually running
        # Catches silent ECS rollbacks — if ECS rolled back to old code the
        # PRIMARY deployment will show the old ARN and this step fails the job.
        run: |
          RUNNING=$(aws ecs describe-services \
            --cluster  "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --query 'services[0].deployments[?status==`PRIMARY`].taskDefinition | [0]' \
            --output text)
          EXPECTED="${{ steps.register.outputs.arn }}"
          echo "Expected: $EXPECTED"
          echo "Running:  $RUNNING"
          if [ "$RUNNING" != "$EXPECTED" ]; then
            echo "::error::ECS is running the OLD task definition — deployment rolled back."
            echo "::error::Check CloudWatch logs: /ecs/wholesale-crm"
            exit 1
          fi
          echo "Confirmed: new task definition is live."

      - name: Smoke test production
        # Previous version tested http:// which got a 301 redirect — curl exits 0
        # on 3xx so that test always passed. This checks the real HTTPS endpoint.
        run: |
          echo "Waiting 15 s for load-balancer target registration…"
          sleep 15
          for i in 1 2 3; do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" \
              --max-time 15 "https://wholesalesphere.forum/health")
            echo "Attempt $i — HTTP $STATUS"
            [ "$STATUS" = "200" ] && break
            [ "$i" -lt 3 ] && sleep 15
          done
          if [ "$STATUS" != "200" ]; then
            echo "::error::Production health check returned HTTP $STATUS — app may be down."
            exit 1
          fi
          echo "Smoke test passed — production is healthy."
