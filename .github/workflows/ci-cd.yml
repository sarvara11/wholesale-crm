name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: wholesale-crm
  NODE_VERSION: "20"

jobs:
  # ── Job 1: Lint & Test ──────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint — 0 errors allowed)
        run: npm run lint

      - name: Test
        run: npm test
        # ─── Replace with a real test runner (Jest, Mocha…) once tests exist ───
        # env:
        #   MONGODB_URI: ${{ secrets.MONGODB_URI_TEST }}  # use a separate test DB
        #   JWT_SECRET:  test_secret_only

  # ── Job 2: Build & Push Docker image ───────────────────────────────────────
  #
  # Only runs on pushes to main (not on PRs) to avoid publishing untested images.
  # The multi-stage Dockerfile produces a lean node:20-alpine image with a
  # non-root user — ready to be pulled by any container orchestrator.
  # ───────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Push Image
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Registry login ─────────────────────────────────────────────────────
      # Default: GitHub Container Registry (GHCR).
      # Alternatives — comment/uncomment as needed:
      #
      # Docker Hub:
      #   registry: (omit)
      #   username: ${{ secrets.DOCKERHUB_USERNAME }}
      #   password: ${{ secrets.DOCKERHUB_TOKEN }}
      #
      # AWS ECR (replace with aws-actions/amazon-ecr-login@v2 action instead):
      #   Use: aws-actions/configure-aws-credentials + aws-actions/amazon-ecr-login
      #
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Two tags: a stable :latest and an immutable :<sha> for rollbacks
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          # Layer cache stored in GitHub Actions cache — speeds up repeat builds
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          # Build args can be injected here (none needed — all config via env vars at runtime)

  # ── Job 3: Deploy ──────────────────────────────────────────────────────────
  #
  # Stateless design makes this trivially swappable for any cloud provider.
  # Because every secret is an env var (12-factor), you just update
  # the container definition and restart — no code changes needed.
  #
  # This job requires a GitHub Actions "environment" called `production`
  # (repo Settings → Environments) so secrets like MONGODB_URI and JWT_SECRET
  # are kept separate from CI secrets and can require manual approval.
  # ───────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production  # add approval rules here for gated deploys

    steps:
      # ── Option A: AWS ECS ─────────────────────────────────────────────────
      # - name: Deploy to ECS
      #   uses: aws-actions/amazon-ecs-deploy-task-definition@v1
      #   with:
      #     task-definition: ecs-task-def.json
      #     service: wholesale-crm-service
      #     cluster: wholesale-crm-cluster
      #     wait-for-service-stability: true

      # ── Option B: GCP Cloud Run ───────────────────────────────────────────
      # - name: Deploy to Cloud Run
      #   run: |
      #     gcloud run deploy wholesale-crm \
      #       --image ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
      #       --region us-central1 \
      #       --platform managed \
      #       --set-env-vars MONGODB_URI=${{ secrets.MONGODB_URI }},JWT_SECRET=${{ secrets.JWT_SECRET }}

      # ── Option C: Kubernetes ──────────────────────────────────────────────
      # - name: Deploy to Kubernetes
      #   run: |
      #     kubectl set image deployment/crm \
      #       crm=ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
      #     kubectl rollout status deployment/crm

      # ── Option D: Render / Railway / Fly.io ──────────────────────────────
      # - name: Trigger Render deploy hook
      #   run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

      # ── Placeholder (active until you choose a provider) ─────────────────
      - name: Deploy placeholder
        run: |
          echo "Image pushed:"
          echo "  ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo ""
          echo "Uncomment one of the deploy options above and add these secrets"
          echo "to the 'production' GitHub Actions environment:"
          echo "  MONGODB_URI    — Atlas connection string"
          echo "  JWT_SECRET     — 64-char random hex"
          echo "  COOKIE_SECURE  — true"
          echo "  NODE_ENV       — production"
          echo "  PORT           — (cloud assigns automatically on most platforms)"
