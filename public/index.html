<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cati CRM</title>
  <style>
    body { margin:0; background:#312e81; display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .spinner { width:2.5rem; height:2.5rem; border:4px solid rgba(255,255,255,.2); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <script>
    (async () => {
      try {
        const res = await fetch('/api/auth/me', { credentials: 'include' });
        if (res.ok) {
          window.location.replace('/app.html');
        } else {
          window.location.replace('/login.html');
        }
      } catch {
        window.location.replace('/login.html');
      }
    })();
  </script>
</body>
</html>
