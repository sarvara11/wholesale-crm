<!DOCTYPE html>
<html lang="en" class="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wholesale CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter','system-ui','sans-serif'] },
          colors: {
            primary: { DEFAULT:'#6366f1', dark:'#4f46e5', light:'#818cf8' }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-white overflow-x-hidden">

  <!-- ── SIDEBAR ──────────────────────────────────────────────────────────── -->
  <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 flex flex-col" style="width:260px">

    <!-- Logo -->
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">
        <i class="fa-solid fa-shirt text-white text-base"></i>
      </div>
      <div class="sidebar-logo-text">
        <strong>Sarvar CRM</strong>
        <span>Cloud Edition</span>
      </div>
    </div>

    <!-- Nav -->
    <div class="flex-1 overflow-y-auto px-3 py-3">
      <p class="sidebar-section-label">Main Menu</p>
      <nav id="sidebar-nav" class="space-y-0.5">
        <!-- Injected by app.js -->
      </nav>
      <div id="sidebar-manager-section" class="hidden">
        <div class="section-divider mx-2 my-3"></div>
        <p class="sidebar-section-label">Administration</p>
        <nav id="sidebar-nav-admin" class="space-y-0.5">
          <!-- Manager-only items injected by app.js -->
        </nav>
      </div>
    </div>

    <!-- User strip -->
    <div id="sidebar-user" class="px-3 py-3 flex-shrink-0" style="border-top:1px solid rgba(255,255,255,.08)">
      <!-- Injected by app.js -->
    </div>
  </aside>

  <!-- ── MAIN ──────────────────────────────────────────────────────────────── -->
  <div style="padding-left:260px" class="flex flex-col min-h-screen">

    <!-- Topbar -->
    <header id="topbar">
      <div class="flex items-center gap-3">
        <h1 id="page-title" class="text-lg font-bold text-gray-800 dark:text-white tracking-tight">Dashboard</h1>
      </div>

      <div class="flex items-center gap-2">
        <!-- Theme toggle -->
        <button id="theme-toggle" class="topbar-btn" title="Toggle theme">
          <i id="theme-icon" class="fa-solid fa-moon text-sm"></i>
        </button>

        <!-- Notifications -->
        <button class="topbar-btn relative" title="Notifications">
          <i class="fa-solid fa-bell text-sm"></i>
          <span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full border-2 border-white dark:border-gray-800"></span>
        </button>

        <!-- Divider -->
        <div class="w-px h-6 bg-gray-200 dark:bg-gray-700 mx-1"></div>

        <!-- User menu -->
        <div class="relative">
          <button id="user-menu-btn"
            class="flex items-center gap-2.5 rounded-xl px-2.5 py-1.5 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
            <div id="user-avatar"
              class="w-8 h-8 rounded-full bg-gradient-to-br from-indigo-400 to-indigo-600 flex items-center justify-center text-white text-xs font-bold flex-shrink-0 shadow-md"></div>
            <div class="hidden md:block text-left leading-tight">
              <p id="user-display-name" class="text-sm font-semibold text-gray-800 dark:text-white"></p>
              <p id="user-display-role" class="text-xs text-gray-400 capitalize"></p>
            </div>
            <i class="fa-solid fa-chevron-down text-[10px] text-gray-400 ml-0.5"></i>
          </button>

          <!-- Dropdown -->
          <div id="user-dropdown"
            class="hidden absolute right-0 top-full mt-2 w-52 bg-white dark:bg-gray-800 rounded-2xl shadow-xl border border-gray-100 dark:border-gray-700 overflow-hidden z-50">
            <!-- User info header -->
            <div class="px-4 py-3 bg-gray-50 dark:bg-gray-900/50 border-b border-gray-100 dark:border-gray-700">
              <p class="text-xs font-semibold text-gray-800 dark:text-white" id="dd-name"></p>
              <p class="text-xs text-gray-400 truncate" id="dd-email"></p>
            </div>
            <div class="py-1">
              <a href="#/profile" id="dd-profile"
                class="flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700/50">
                <i class="fa-solid fa-user text-gray-400 w-4 text-center text-xs"></i> My Profile
              </a>
              <a href="#/dashboard"
                class="flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700/50">
                <i class="fa-solid fa-gauge text-gray-400 w-4 text-center text-xs"></i> Dashboard
              </a>
            </div>
            <div class="border-t border-gray-100 dark:border-gray-700 py-1">
              <button id="logout-btn"
                class="w-full flex items-center gap-3 px-4 py-2.5 text-sm text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20">
                <i class="fa-solid fa-right-from-bracket w-4 text-center text-xs"></i> Sign out
              </button>
            </div>
          </div>
        </div>
      </div>
    </header>

    <!-- Page content -->
    <main id="page-content" class="flex-1 p-6">
    </main>
  </div>

  <!-- ── MODAL ─────────────────────────────────────────────────────────────── -->
  <div id="modal-overlay"
    class="hidden fixed inset-0 z-[100] items-center justify-center p-4"
    style="background:rgba(0,0,0,.55);backdrop-filter:blur(4px)">
    <div id="modal-box"
      class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto"
      style="box-shadow:0 25px 50px rgba(0,0,0,.3)">
      <div id="modal-content"></div>
    </div>
  </div>

  <!-- ── TOAST ─────────────────────────────────────────────────────────────── -->
  <div id="toast-container"
    class="fixed bottom-6 right-6 z-[200] flex flex-col gap-2 pointer-events-none"></div>

  <!-- ── SCRIPTS ───────────────────────────────────────────────────────────── -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="/js/customers.js"></script>
  <script src="/js/leads.js"></script>
  <script src="/js/opportunities.js"></script>
  <script src="/js/activities.js"></script>
  <script src="/js/inventory.js"></script>
  <script src="/js/reports.js"></script>
  <script src="/js/users.js"></script>
  <script src="/js/audit.js"></script>
  <script src="/js/profile.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
